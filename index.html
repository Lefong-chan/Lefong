<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTV Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
/* ═══════════════════════════════
   VARIABLES & RESET
═══════════════════════════════ */
:root{
  --bg:#08080e;
  --surface:#111118;
  --surface2:#181824;
  --surface3:#20202e;
  --surface4:#282838;
  --accent:#e50914;
  --accent2:#ff5a1f;
  --accent-dim:rgba(229,9,20,0.15);
  --green:#22c55e;
  --gold:#f5c518;
  --text:#eeeef5;
  --text2:#8888aa;
  --text3:#44445a;
  --border:rgba(255,255,255,0.05);
  --border2:rgba(255,255,255,0.1);
  --glow:0 0 0 2px rgba(229,9,20,0.35);
  --sidebar-w:270px;
  --header-h:58px;
  --footer-h:48px;
  --mobile-nav-h:60px;
  --radius:8px;
  --radius-lg:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ═══════════════════════════════
   SCROLLBARS
═══════════════════════════════ */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:2px;}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.header{
  height:var(--header-h);
  background:rgba(8,8,14,0.97);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 16px;
  gap:12px;
  flex-shrink:0;
  position:relative;
  z-index:200;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 0 var(--border),0 4px 24px rgba(0,0,0,0.6);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.75rem;
  letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  flex-shrink:0;
  line-height:1;
}
.logo b{
  -webkit-text-fill-color:var(--text);
  color:var(--text);
  font-weight:700;
}

.h-search{
  flex:1;
  position:relative;
  max-width:420px;
}
.h-search i{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text3);
  font-size:0.78rem;
  pointer-events:none;
}
.h-search input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:7px 12px 7px 32px;
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-size:0.85rem;
  outline:none;
  transition:border-color 0.2s,background 0.2s;
}
.h-search input:focus{border-color:rgba(229,9,20,0.5);background:var(--surface3);}
.h-search input::placeholder{color:var(--text3);}

.h-right{
  display:flex;
  align-items:center;
  gap:10px;
  margin-left:auto;
  flex-shrink:0;
}

.cmd-trigger{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:6px 11px;
  cursor:pointer;
  color:var(--text3);
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.5px;
  transition:all 0.2s;
  white-space:nowrap;
}
.cmd-trigger:hover{border-color:var(--accent);color:var(--accent);}
.cmd-trigger kbd{
  background:var(--surface3);
  border:1px solid var(--border2);
  border-radius:3px;
  padding:1px 5px;
  font-size:0.65rem;
  font-family:monospace;
  color:var(--text2);
}

.status-badge{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 10px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.72rem;
  color:var(--text2);
  white-space:nowrap;
}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sdot.live{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,0.5);animation:blink 1.6s ease-in-out infinite;}
.sdot.error{background:var(--accent);}
.sdot.loading{background:var(--gold);animation:blink 0.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

/* ═══════════════════════════════
   LAYOUT
═══════════════════════════════ */
.app{
  display:flex;
  flex:1;
  overflow:hidden;
  /* leave room for fixed footer on desktop */
  padding-bottom:var(--footer-h);
}

/* ═══════════════════════════════
   SIDEBAR (Desktop)
═══════════════════════════════ */
.sidebar{
  width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
  transition:transform 0.3s ease,width 0.3s ease;
}

.sb-header{
  padding:14px 14px 0;
  flex-shrink:0;
}
.sb-header-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.65rem;
  font-weight:800;
  letter-spacing:2px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:10px;
  padding:0 2px;
}

.sb-tabs{
  display:flex;
  background:var(--surface2);
  border-radius:var(--radius);
  padding:3px;
  gap:2px;
  margin-bottom:12px;
}
.sb-tab{
  flex:1;
  padding:7px 8px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.72rem;
  font-weight:700;
  letter-spacing:0.5px;
  text-transform:uppercase;
  color:var(--text3);
  background:none;
  border:none;
  cursor:pointer;
  border-radius:6px;
  transition:all 0.18s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.sb-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(229,9,20,0.3);}
.sb-tab:hover:not(.active){color:var(--text2);background:var(--surface3);}

.sb-panel{display:none;flex-direction:column;overflow:hidden;flex:1;}
.sb-panel.active{display:flex;}

/* Country list */
.c-list{overflow-y:auto;flex:1;padding:0 6px 6px;}
.c-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 10px;
  cursor:pointer;
  border-radius:7px;
  transition:background 0.15s;
  margin-bottom:2px;
}
.c-item:hover{background:var(--surface2);}
.c-item.active{background:var(--accent-dim);}
.c-item.active .c-name{color:var(--accent);}
.c-item.active .c-icon{color:var(--accent);}
.c-icon{font-size:0.82rem;color:var(--text3);width:16px;text-align:center;flex-shrink:0;}
.c-name{font-size:0.8rem;font-weight:500;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-count{
  font-size:0.65rem;
  color:var(--text3);
  background:var(--surface3);
  padding:2px 6px;
  border-radius:8px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  flex-shrink:0;
  min-width:28px;
  text-align:center;
}
.c-item.active .c-count{background:rgba(229,9,20,0.25);color:var(--accent);}

/* Channel panel */
.ch-panel-top{padding:0 14px 8px;flex-shrink:0;}
.ch-panel-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:8px;
}
.ch-panel-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.88rem;
  font-weight:800;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:0.5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:150px;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:5px;
  background:var(--surface3);
  border:none;
  border-radius:6px;
  color:var(--text2);
  font-size:0.7rem;
  padding:5px 10px;
  cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  letter-spacing:0.5px;
  transition:all 0.15s;
  flex-shrink:0;
}
.back-btn:hover{background:var(--surface4);color:var(--text);}
.ch-filter-input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:7px;
  padding:7px 11px 7px 30px;
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-size:0.78rem;
  outline:none;
  transition:border-color 0.2s;
  position:relative;
}
.ch-filter-wrap{position:relative;}
.ch-filter-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.72rem;pointer-events:none;}
.ch-filter-input:focus{border-color:rgba(229,9,20,0.4);}
.ch-filter-input::placeholder{color:var(--text3);}

.ch-list{overflow-y:auto;flex:1;padding:0 6px 6px;}
.ch-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  cursor:pointer;
  border-radius:7px;
  transition:background 0.15s;
  margin-bottom:2px;
}
.ch-item:hover{background:var(--surface2);}
.ch-item.active{background:var(--accent-dim);}
.ch-item.active .ch-n{color:var(--text);}
.ch-num-badge{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.62rem;
  color:var(--text3);
  width:18px;
  text-align:right;
  flex-shrink:0;
}
.ch-logo{
  width:32px;height:32px;
  border-radius:6px;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  font-size:0.55rem;color:var(--text3);font-weight:800;
  font-family:'Barlow Condensed',sans-serif;
  overflow:hidden;flex-shrink:0;text-align:center;line-height:1.1;
  border:1px solid var(--border);
}
.ch-logo img{width:100%;height:100%;object-fit:contain;}
.ch-info{flex:1;min-width:0;}
.ch-n{font-size:0.78rem;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-g{font-size:0.63rem;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-play-icon{color:var(--accent);font-size:0.65rem;flex-shrink:0;opacity:0;}
.ch-item.active .ch-play-icon{opacity:1;}

/* ═══════════════════════════════
   MAIN CONTENT
═══════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* Loading screen */
.loading-scr{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}
.loading-logo{
  font-family:'Bebas Neue',sans-serif;font-size:3.5rem;
  letter-spacing:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.loading-sub{
  font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;
  color:var(--text3);letter-spacing:2px;text-transform:uppercase;
}
.loading-prog{width:200px;height:2px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.loading-prog-bar{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  animation:progAnim 1.4s ease-in-out infinite;
}
@keyframes progAnim{0%{width:0;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0;margin-left:100%}}

/* Grid view */
.grid-view{
  flex:1;overflow-y:auto;
  padding:16px 16px 6px;
  display:none;flex-direction:column;
}
.grid-view.show{display:flex;}
.grid-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-shrink:0;
  gap:10px;
}
.grid-ttl{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.5rem;letter-spacing:2px;color:var(--text);line-height:1;
}
.grid-ttl span{color:var(--accent);}
.grid-meta{font-size:0.72rem;color:var(--text3);font-family:'Barlow Condensed',sans-serif;margin-top:2px;}
.vtoggle{display:flex;gap:3px;}
.vbtn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text3);
  padding:5px 10px;cursor:pointer;font-size:0.82rem;transition:all 0.18s;
}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Channel grid */
.ch-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}
.ch-grid.list{grid-template-columns:1fr;}

.g-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;cursor:pointer;
  transition:transform 0.16s,border-color 0.16s,box-shadow 0.16s;
  position:relative;
}
.g-card:hover{
  transform:translateY(-3px) scale(1.02);
  border-color:rgba(229,9,20,0.35);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  z-index:2;
}
.g-card.active{
  border-color:var(--accent);
  box-shadow:var(--glow);
}
.g-card.active .card-num{background:var(--accent);}

.card-thumb{
  width:100%;aspect-ratio:16/9;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:contain;}
.card-txt{
  font-size:0.58rem;font-weight:800;color:var(--text3);
  font-family:'Barlow Condensed',sans-serif;
  text-align:center;padding:4px 6px;line-height:1.25;
  text-transform:uppercase;letter-spacing:0.5px;
}
.play-overlay{
  position:absolute;inset:0;
  background:rgba(229,9,20,0.85);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.16s;
}
.play-overlay i{color:#fff;font-size:1.3rem;}
.g-card:hover .play-overlay,.g-card.active .play-overlay{opacity:1;}
.g-card.active .play-overlay{background:rgba(229,9,20,0.6);}

.card-body{padding:7px 10px 9px;}
.card-name{
  font-size:0.75rem;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
}
.card-grp{font-size:0.62rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-num{
  position:absolute;top:6px;left:6px;
  background:rgba(0,0,0,0.7);
  border-radius:4px;padding:1px 5px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.6rem;font-weight:700;color:#fff;
  backdrop-filter:blur(4px);
  transition:background 0.2s;
}

/* List mode */
.ch-grid.list .g-card{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:8px;}
.ch-grid.list .card-thumb{width:46px;height:46px;aspect-ratio:1;border-radius:6px;flex-shrink:0;}
.ch-grid.list .card-body{flex:1;min-width:0;padding:0;}
.ch-grid.list .play-overlay i{font-size:0.9rem;}
.ch-grid.list .card-num{top:4px;left:4px;}

/* ═══════════════════════════════
   PLAYER VIEW
═══════════════════════════════ */
.player-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.player-view.show{display:flex;}

.player-wrap{
  flex:1;background:#000;
  position:relative;display:flex;
  align-items:center;justify-content:center;min-height:0;
}
#videoPlayer{width:100%;height:100%;object-fit:contain;display:block;}

/* Spinner */
.spin-ov{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
  display:none;align-items:center;justify-content:center;z-index:9;
}
.spin-ov.show{display:flex;}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,0.08);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.player-err{
  position:absolute;inset:0;
  background:rgba(8,8,14,0.9);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:10;
}
.player-err.show{display:flex;}
.err-icon{
  width:64px;height:64px;
  background:rgba(229,9,20,0.12);
  border:1px solid rgba(229,9,20,0.25);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.err-icon i{font-size:1.6rem;color:var(--accent);}
.err-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--text);letter-spacing:1px;}
.err-msg{font-size:0.8rem;color:var(--text3);text-align:center;max-width:240px;line-height:1.5;}
.retry-btn{
  background:var(--accent);border:none;border-radius:7px;color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.82rem;
  letter-spacing:1px;padding:9px 22px;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  transition:opacity 0.2s,transform 0.1s;
  text-transform:uppercase;
}
.retry-btn:hover{opacity:0.85;}
.retry-btn:active{transform:scale(0.97);}

/* Player overlay */
.player-ov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.2) 50%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:16px 20px 18px;
  opacity:0;transition:opacity 0.25s;
  pointer-events:none;z-index:8;
}
.player-wrap:hover .player-ov{opacity:1;pointer-events:auto;}

.now-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(34,197,94,0.15);
  border:1px solid rgba(34,197,94,0.3);
  border-radius:20px;
  padding:3px 9px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.63rem;font-weight:700;
  color:var(--green);letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:6px;
  width:fit-content;
}
.now-badge i{font-size:0.45rem;}
.now-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.2rem,3vw,1.8rem);
  letter-spacing:2px;line-height:1.1;
  margin-bottom:12px;
  text-shadow:0 2px 10px rgba(0,0,0,0.8);
}
.now-grp{font-size:0.72rem;color:var(--text2);margin-bottom:14px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;}

.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cbtn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:0.85rem;
  transition:all 0.18s;backdrop-filter:blur(4px);
}
.cbtn:hover{background:var(--accent);border-color:var(--accent);}
.cbtn:active{transform:scale(0.93);}
.cbtn.big{width:48px;height:48px;font-size:1rem;background:var(--accent);border-color:var(--accent);box-shadow:0 4px 16px rgba(229,9,20,0.4);}
.cbtn.big:hover{background:#c50811;}

.vol-grp{
  display:flex;align-items:center;gap:7px;
  margin-left:auto;
  color:rgba(255,255,255,0.7);font-size:0.8rem;
}
.vol-grp input[type=range]{width:80px;accent-color:var(--accent);cursor:pointer;}
.fs-btn{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
  border-radius:7px;padding:6px 11px;color:#fff;cursor:pointer;
  font-size:0.82rem;transition:all 0.18s;backdrop-filter:blur(4px);
}
.fs-btn:hover{background:var(--accent);border-color:var(--accent);}

/* Player bottom bar */
.player-bar{
  padding:10px 14px;
  display:flex;align-items:center;gap:8px;
  background:var(--surface);

<script>
// ════════════════════════════════════
//  CONFIG
// ════════════════════════════════════
const PLAYLIST = 'playlist.m3u8';

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let channels=[], filtered=[], groups={};
let curCh=null, curIdx=-1, curGroup=null;
let hls=null, curUrl='', retries=0;
const MAX_RETRY=3;
let cmdRes=[], cmdSel=0;

// ════════════════════════════════════
//  BOOT — AUTO-LOAD
// ════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  fetchPlaylist(PLAYLIST);
});

function fetchPlaylist(src){
  setStatus('loading','Chargement...');
  fetch(src+'?nc='+Date.now())
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(t=>initPlaylist(t))
    .catch(err=>{
      setStatus('error','Fichier introuvable');
      document.getElementById('loadingScr').innerHTML=`
        <div style="text-align:center;padding:20px 30px;">
          <div style="width:72px;height:72px;background:rgba(229,9,20,0.1);border:1px solid rgba(229,9,20,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:1.8rem;color:var(--accent);"></i>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--text);margin-bottom:8px;">FICHIER INTROUVABLE</div>
          <div style="font-size:0.82rem;color:var(--text2);line-height:1.8;">
            Placez <strong style="color:var(--accent);">playlist.m3u8</strong><br>
            dans le même dossier que ce fichier HTML<br>
            <span style="color:var(--text3);font-size:0.75rem;">Utilisez un serveur local (Live Server, WAMP...)</span>
          </div>
        </div>`;
    });
}

// ════════════════════════════════════
//  PARSER M3U
// ════════════════════════════════════
function parseM3U(txt){
  const lines=txt.split(/\r?\n/);
  const chs=[];
  let cur=null;
  for(const line of lines){
    const l=line.trim();
    if(l.startsWith('#EXTINF')){
      cur={id:chs.length,name:'',url:'',logo:'',group:'Divers'};
      const nm=l.match(/,(.+)$/);
      if(nm) cur.name=nm[1].trim();
      const lg=l.match(/tvg-logo="([^"]*)"/i);
      if(lg&&lg[1].trim()) cur.logo=lg[1].trim();
      const gr=l.match(/group-title="([^"]*)"/i);
      if(gr&&gr[1].trim()) cur.group=gr[1].trim();
    } else if(l&&!l.startsWith('#')&&cur){
      cur.url=l;
      if(cur.name&&cur.url) chs.push(cur);
      cur=null;
    }
  }
  return chs;
}

function buildGroups(chs){
  const g={};
  chs.forEach(ch=>{ if(!g[ch.group]) g[ch.group]=[]; g[ch.group].push(ch); });
  return g;
}

function initPlaylist(txt){
  channels=parseM3U(txt);
  if(!channels.length){
    setStatus('error','Aucune chaîne');
    document.getElementById('loadingScr').innerHTML='<div style="text-align:center;padding:30px;color:var(--text3);"><i class="fa-solid fa-face-sad-tear" style="font-size:2rem;display:block;margin-bottom:12px;color:var(--accent);"></i>Aucune chaîne trouvée.</div>';
    return;
  }
  groups=buildGroups(channels);
  filtered=[...channels];
  renderCountries();
  renderGrid(channels,'TOUTES LES');
  renderChList(channels);
  document.getElementById('loadingScr').style.display='none';
  document.getElementById('gridView').classList.add('show');
  const gc=Object.keys(groups).length;
  setStatus('live',`${channels.length} ch · ${gc} groupes`);
  document.getElementById('gridMeta').textContent=`${channels.length} chaînes · ${gc} groupes`;
  showToast('<i class="fa-solid fa-check-circle"></i> Prêt',`${channels.length} chaînes chargées`);
}

// ════════════════════════════════════
//  STATUS
// ════════════════════════════════════
function setStatus(type,txt){
  document.getElementById('sDot').className='sdot '+type;
  document.getElementById('sTxt').textContent=txt;
}

// ════════════════════════════════════
//  GROUP ICONS
// ════════════════════════════════════
function gIcon(g){
  const s=g.toLowerCase();
  if(/sport|foot|nba|tennis|rugby|basket/.test(s)) return 'fa-solid fa-futbol';
  if(/news|info|actua|journal|bfm|cnews/.test(s)) return 'fa-solid fa-newspaper';
  if(/kids|enfant|junior|cartoon|nickel|gulli/.test(s)) return 'fa-solid fa-star';
  if(/cine|movie|film|hbo|prime|netflix|canal/.test(s)) return 'fa-solid fa-film';
  if(/music|musique|mtv|clip|radio/.test(s)) return 'fa-solid fa-music';
  if(/anime|manga/.test(s)) return 'fa-solid fa-dragon';
  if(/doc|nature|discovery|national|geo/.test(s)) return 'fa-solid fa-video';
  if(/cook|cuisine|food/.test(s)) return 'fa-solid fa-utensils';
  if(/religi|islam|church|gospel/.test(s)) return 'fa-solid fa-place-of-worship';
  if(/africa|afrique/.test(s)) return 'fa-solid fa-earth-africa';
  if(/europe/.test(s)) return 'fa-solid fa-earth-europe';
  if(/asia|asie|china|india|japan/.test(s)) return 'fa-solid fa-earth-asia';
  if(/latin|brasil|mexico|ameri/.test(s)) return 'fa-solid fa-earth-americas';
  if(/adult|xxx/.test(s)) return 'fa-solid fa-lock';
  return 'fa-solid fa-tv';
}

// ════════════════════════════════════
//  COUNTRIES
// ════════════════════════════════════
function renderCountries(){
  const list=document.getElementById('countryList');
  list.innerHTML='';
  const allEl=_mkCountryItem(null,'fa-solid fa-globe','Toutes les chaînes',channels.length);
  list.appendChild(allEl);
  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([g,chs])=>{
    list.appendChild(_mkCountryItem(g,gIcon(g),g,chs.length));
  });
}

function _mkCountryItem(g,icon,name,count){
  const el=document.createElement('div');
  el.className='c-item'+(curGroup===g?' active':'');
  el.innerHTML=`<i class="${icon} c-icon"></i><span class="c-name" title="${x(name)}">${x(name)}</span><span class="c-count">${count}</span>`;
  el.onclick=()=>filterGroup(g);
  return el;
}

function filterGroup(g){
  curGroup=g;
  const chs=g?(groups[g]||[]):channels;
  filtered=[...chs];
  const title=g?g.toUpperCase():'TOUTES LES';
  renderGrid(chs,title);
  renderChList(chs);
  renderCountries();
  document.getElementById('gridMeta').textContent=`${chs.length} chaînes${g?' · '+g:''}`;
  if(g){
    document.getElementById('chPanelName').textContent=g;
    switchTab('channels');
  }
  closeSidebar();
  // Mobile nav
  setMnavActive('home');
}

// ════════════════════════════════════
//  GRID
// ════════════════════════════════════
function renderGrid(chs,titleStr){
  const parts=titleStr.split(' '), last=parts.pop();
  document.getElementById('gridTtl').innerHTML=parts.join(' ')+' <span>'+last+'</span>';
  const grid=document.getElementById('chGrid');
  grid.innerHTML='';
  chs.forEach((ch,idx)=>{
    const card=document.createElement('div');
    card.className='g-card'+(curCh&&curCh.id===ch.id?' active':'');
    card.dataset.idx=idx;
    const thumbHtml=ch.logo
      ?`<img src="${x(ch.logo)}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=card-txt>${x(ch.name.substring(0,18))}</span>'" alt="">`
      :`<span class="card-txt">${x(ch.name.substring(0,18))}</span>`;
    card.innerHTML=`
      <div class="card-thumb">${thumbHtml}<div class="play-overlay"><i class="fa-solid fa-play"></i></div></div>
      <div class="card-num">${idx+1}</div>
      <div class="card-body">
        <div class="card-name">${x(ch.name)}</div>
        <div class="card-grp">${x(ch.group)}</div>
      </div>`;
    card.onclick=()=>play(ch,idx);
    grid.appendChild(card);
  });
}

// ════════════════════════════════════
//  CHANNEL LIST (sidebar)
// ════════════════════════════════════
function renderChList(chs){
  const list=document.getElementById('chList');
  list.innerHTML='';
  chs.forEach((ch,idx)=>{
    const item=document.createElement('div');
    item.className='ch-item'+(curCh&&curCh.id===ch.id?' active':'');
    item.dataset.chidx=idx;
    const logo=ch.logo?`<img src="${x(ch.logo)}" loading="lazy" onerror="this.style.display='none'" alt="">`:x(ch.name.substring(0,4));
    item.innerHTML=`
      <span class="ch-num-badge">${idx+1}</span>
      <div class="ch-logo">${logo}</div>
      <div class="ch-info"><div class="ch-n">${x(ch.name)}</div><div class="ch-g">${x(ch.group)}</div></div>
      <i class="fa-solid fa-play ch-play-icon"></i>`;
    item.onclick=()=>play(ch,idx);
    list.appendChild(item);
  });
}

// ════════════════════════════════════
//  PLAY CHANNEL
// ════════════════════════════════════
function play(ch,idx){
  curCh=ch; curIdx=idx; retries=0;
  document.querySelectorAll('.g-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.ch-item').forEach(c=>c.classList.remove('active'));
  const card=document.querySelector(`.g-card[data-idx="${idx}"]`);
  if(card) card.classList.add('active');
  const item=document.querySelector(`.ch-item[data-chidx="${idx}"]`);
  if(item){item.classList.add('active');item.scrollIntoView({block:'nearest',behavior:'smooth'});}
  document.getElementById('nowName').textContent=ch.name;
  document.getElementById('nowGrp').textContent=ch.group;
  document.getElementById('chCur').textContent=idx+1;
  document.getElementById('chTot').textContent=filtered.length;
  showPlayerView();
  loadStream(ch.url);
  showToast(`<i class="fa-solid fa-play"></i> ${x(ch.name)}`,ch.group);
  setStatus('loading',ch.name);
  setMnavActive('home');
  closeSidebar();
}

function showPlayerView(){
  document.getElementById('gridView').classList.remove('show');
  document.getElementById('playerView').classList.add('show');
}

function closePlayer(){
  stopStream();
  document.getElementById('playerView').classList.remove('show');
  document.getElementById('gridView').classList.add('show');
  setStatus('live',`${channels.length} ch · ${Object.keys(groups).length} groupes`);
}

// ════════════════════════════════════
//  STREAM ENGINE
// ════════════════════════════════════
function loadStream(url){
  curUrl=url;
  const v=document.getElementById('video');
  showSpin();
  document.getElementById('playerErr').classList.remove('show');
  document.getElementById('ppBtn').innerHTML='<i class="fa-solid fa-pause"></i>';
  if(hls){hls.destroy();hls=null;}
  v.pause(); v.removeAttribute('src'); v.load();
  const isHls=/\.m3u8($|\?)|\/m3u8|m3u8/i.test(url);
  if(Hls.isSupported()&&isHls) _hlsPlay(url,v);
  else if(v.canPlayType('application/vnd.apple.mpegurl')&&isHls) _nativePlay(url,v);
  else _nativePlay(url,v);
}

function _hlsPlay(url,v){
  hls=new Hls({
    enableWorker:true,lowLatencyMode:true,
    backBufferLength:60,maxBufferLength:30,maxMaxBufferLength:600,
    fragLoadingTimeOut:20000,manifestLoadingTimeOut:15000,levelLoadingTimeOut:15000,
  });
  hls.loadSource(url);
  hls.attachMedia(v);
  hls.once(Hls.Events.MANIFEST_PARSED,()=>{
    v.play().then(()=>{hideSpin();setStatus('live',curCh?curCh.name:'');}).catch(()=>hideSpin());
  });
  hls.on(Hls.Events.ERROR,(e,data)=>{
    if(!data.fatal) return;
    if(data.type===Hls.ErrorTypes.NETWORK_ERROR&&retries<MAX_RETRY){
      retries++; setTimeout(()=>hls&&hls.startLoad(),1500*retries);
    } else if(data.type===Hls.ErrorTypes.MEDIA_ERROR&&retries<MAX_RETRY){
      retries++; hls.recoverMediaError();
    } else {
      hls.destroy();hls=null; _nativePlay(url,v);
    }
  });
}

function _nativePlay(url,v){
  v.src=url; v.load();
  let ok=false;
  v.addEventListener('canplay',function onCP(){
    v.removeEventListener('canplay',onCP);
    if(!ok){ok=true;hideSpin();setStatus('live',curCh?curCh.name:'');}
  });
  v.addEventListener('error',function onE(){
    v.removeEventListener('error',onE);
    if(!ok) showErr('Flux inaccessible ou format non supporté');
  });
  v.play().then(()=>{if(!ok){ok=true;hideSpin();setStatus('live',curCh?curCh.name:'');}}).catch(()=>{
    setTimeout(()=>{
      if(v.readyState>=3){hideSpin();setStatus('live',curCh?curCh.name:'');}
      else if(v.error) showErr('Erreur: '+(v.error.message||'inconnue'));
    },3500);
  });
}

function showSpin(){document.getElementById('spinOv').classList.add('show');}
function hideSpin(){document.getElementById('spinOv').classList.remove('show');}

function showErr(msg){
  hideSpin();
  document.getElementById('playerErr').classList.add('show');
  document.getElementById('errMsg').textContent=msg||'Impossible de lire cette chaîne';
  setStatus('error','Erreur flux');
}

function retryStream(){if(!curCh) return; retries=0; document.getElementById('playerErr').classList.remove('show'); loadStream(curCh.url);}

function stopStream(){
  const v=document.getElementById('video');
  if(hls){hls.destroy();hls=null;}
  v.pause(); v.removeAttribute('src'); v.load();
  hideSpin(); document.getElementById('playerErr').classList.remove('show');
}

function togglePlay(){
  const v=document.getElementById('video');
  const btn=document.getElementById('ppBtn');
  if(v.paused){v.play();btn.innerHTML='<i class="fa-solid fa-pause"></i>';}
  else{v.pause();btn.innerHTML='<i class="fa-solid fa-play"></i>';}
}
function setVol(v){document.getElementById('video').volume=parseFloat(v);}
function toggleFS(){
  const w=document.getElementById('playerWrap');
  if(!document.fullscreenElement) w.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
function nextCh(){if(!filtered.length) return; const n=(curIdx+1)%filtered.length; play(filtered[n],n);}
function prevCh(){if(!filtered.length) return; const p=(curIdx-1+filtered.length)%filtered.length; play(filtered[p],p);}

// ════════════════════════════════════
//  SEARCH
// ════════════════════════════════════
document.getElementById('chFilter').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  const base=curGroup?(groups[curGroup]||[]):channels;
  renderChList(q?base.filter(ch=>ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)):base);
});

document.getElementById('mainSearch').addEventListener('input',function(){
  if(!channels.length) return;
  const q=this.value.toLowerCase();
  const base=curGroup?(groups[curGroup]||[]):channels;
  const res=q?base.filter(ch=>ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)):base;
  filtered=res;
  renderGrid(res,q?'RÉSULTATS':(curGroup?curGroup.toUpperCase():'TOUTES LES'));
  renderChList(res);
  document.getElementById('gridMeta').textContent=`${res.length} chaîne${res.length>1?'s':''}${q?' pour "'+q+'"':''}`;
});

// ════════════════════════════════════
//  CMD PALETTE
// ════════════════════════════════════
function openCmd(){
  if(!channels.length) return;
  document.getElementById('cmdBackdrop').classList.add('open');
  const inp=document.getElementById('cmdInput');
  inp.value=''; inp.focus();
  cmdSel=0; buildCmd('');
}
function closeCmd(){document.getElementById('cmdBackdrop').classList.remove('open');}

document.getElementById('cmdInput').addEventListener('input',function(){cmdSel=0;buildCmd(this.value);});

function buildCmd(q){
  q=q.toLowerCase().trim();
  cmdRes=q?channels.filter(ch=>ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)).slice(0,30):channels.slice(0,20);
  renderCmdList();
}

function renderCmdList(){
  const el=document.getElementById('cmdList');
  if(!cmdRes.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.82rem;"><i class="fa-solid fa-circle-xmark" style="display:block;font-size:1.4rem;margin-bottom:8px;color:var(--text3);"></i>Aucun résultat</div>';
    return;
  }
  el.innerHTML=`<div class="cmd-section"><i class="fa-solid fa-tv" style="margin-right:5px;"></i>Chaînes (${cmdRes.length})</div>`+
    cmdRes.map((ch,i)=>{
      const logo=ch.logo?`<img src="${x(ch.logo)}" onerror="this.style.display='none'" alt="">`:x(ch.name.substring(0,4));
      return `<div class="cmd-item${i===cmdSel?' sel':''}" data-ci="${i}">
        <div class="cmd-clogo">${logo}</div>
        <div><div class="cmd-cn">${x(ch.name)}</div><div class="cmd-cg">${x(ch.group)}</div></div>
      </div>`;
    }).join('');
  el.querySelectorAll('.cmd-item').forEach((it,i)=>it.onclick=()=>launchCmd(i));
  const s=el.querySelector('.sel');
  if(s) s.scrollIntoView({block:'nearest'});
}

function launchCmd(i){
  const ch=cmdRes[i]; if(!ch) return;
  closeCmd();
  const ri=filtered.findIndex(c=>c.id===ch.id);
  play(ch,ri>=0?ri:0);
}

document.getElementById('cmdInput').addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){cmdSel=Math.min(cmdSel+1,cmdRes.length-1);renderCmdList();e.preventDefault();}
  else if(e.key==='ArrowUp'){cmdSel=Math.max(cmdSel-1,0);renderCmdList();e.preventDefault();}
  else if(e.key==='Enter') launchCmd(cmdSel);
  else if(e.key==='Escape') closeCmd();
});
document.getElementById('cmdBackdrop').addEventListener('click',e=>{if(e.target===document.getElementById('cmdBackdrop')) closeCmd();});

// ════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════
document.addEventListener('keydown',e=>{
  const inInput=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openCmd();return;}
  if(inInput) return;
  const inPlayer=document.getElementById('playerView').classList.contains('show');
  if(e.key==='Escape'){if(inPlayer) closePlayer(); else closeCmd(); return;}
  if(e.key==='ArrowRight'&&inPlayer){nextCh();return;}
  if(e.key==='ArrowLeft'&&inPlayer){prevCh();return;}
  if(e.key===' '&&inPlayer){e.preventDefault();togglePlay();return;}
  if((e.key==='f'||e.key==='F')&&inPlayer){toggleFS();return;}
  if(!e.ctrlKey&&!e.metaKey&&e.key>='1'&&e.key<='9'){
    const idx=parseInt(e.key)-1;
    if(filtered[idx]) play(filtered[idx],idx);
  }
});

function mnavGo(target,btn){
  setMnavActive(target,btn);
  if(target==='home'){
    closeSidebar();
    if(document.getElementById('playerView').classList.contains('show')){
      // stay in player
    } else {
      document.getElementById('gridView').classList.add('show');
    }
  } else if(target==='pays'){
    switchTab('countries');
    openSidebar();
  } else if(target==='chaines'){
    switchTab('channels');
    openSidebar();
  }
}

function setMnavActive(target,btn){
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  const map={home:'mnavHome',pays:'mnavPays',chaines:'mnavChaines',search:'mnavSearch'};
  const el=document.getElementById(map[target]);
  if(el) el.classList.add('active');
  else if(btn) btn.classList.add('active');
}

  showToast('<i class="fa-brands fa-facebook"></i> Le Fong','+261 33 192 6914 · ericfongchan1@gmail.com');
}

// ════════════════════════════════════
//  TOAST
// ════════════════════════════════════
let toastTmr;
function showToast(title,sub){
  document.getElementById('toastT').innerHTML=title;
  document.getElementById('toastS').textContent=sub||'';
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),3200);
}

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function x(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
