<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --surface3:#22223a;
  --accent:#e50914; --accent2:#ff6b35; --gold:#f5c518;
  --text:#e8e8f0; --text2:#9090b0; --text3:#5a5a7a;
  --border:rgba(255,255,255,0.06); --glow:rgba(229,9,20,0.3);
  --sidebar-w:280px; --header-h:60px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{height:var(--header-h);background:linear-gradient(180deg,rgba(0,0,0,0.97),rgba(10,10,15,0.85));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:18px;z-index:100;flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,0.5);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;flex-shrink:0;}
.logo em{font-style:normal;-webkit-text-fill-color:var(--text);color:var(--text);}
.header-search{flex:1;max-width:480px;position:relative;}
.header-search i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.85rem;pointer-events:none;}
.header-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 14px 8px 38px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s,background 0.2s;}
.header-search input:focus{border-color:var(--accent);background:var(--surface3);}
.header-search input::placeholder{color:var(--text3);}
.header-actions{display:flex;align-items:center;gap:14px;margin-left:auto;}
.kbd-hint{font-size:0.73rem;color:var(--text3);display:flex;align-items:center;gap:4px;}
kbd{background:var(--surface3);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:0.68rem;font-family:'Barlow Condensed',monospace;color:var(--text2);}
.status-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;color:var(--text2);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sdot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.6);animation:blink 1.4s ease-in-out infinite;}
.sdot.error{background:var(--accent);}
.sdot.loading{background:var(--gold);animation:blink 0.7s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* BODY */
.app-body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-tab{flex:1;padding:11px 8px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sb-tab:hover:not(.active){color:var(--text2);}
.sb-panel{display:none;flex-direction:column;overflow:hidden;flex:1;}
.sb-panel.active{display:flex;}

/* Country list */
.country-list{overflow-y:auto;flex:1;}
.country-list::-webkit-scrollbar{width:4px;}
.country-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.c-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.025);transition:background 0.15s;}
.c-item:hover{background:var(--surface2);}
.c-item.active{background:rgba(229,9,20,0.1);border-left:3px solid var(--accent);padding-left:11px;}
.c-item.active .c-name{color:var(--accent);}
.c-item.active .c-icon{color:var(--accent);}
.c-icon{font-size:0.85rem;color:var(--text3);width:17px;text-align:center;flex-shrink:0;}
.c-name{font-size:0.82rem;font-weight:500;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-count{font-size:0.7rem;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;}
.c-item.active .c-count{background:rgba(229,9,20,0.2);color:var(--accent);}

/* Channel list sidebar */
.ch-head{padding:10px 14px 7px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ch-title{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:0.72rem;padding:4px 9px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:4px;transition:background 0.2s,color 0.2s;flex-shrink:0;}
.back-btn:hover{background:var(--surface3);color:var(--text);}
.ch-search{padding:0 10px 8px;flex-shrink:0;}
.ch-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.8rem;outline:none;transition:border-color 0.2s;}
.ch-search input:focus{border-color:var(--accent);}
.ch-search input::placeholder{color:var(--text3);}
.ch-list{overflow-y:auto;flex:1;}
.ch-list::-webkit-scrollbar{width:4px;}
.ch-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.ch-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.025);transition:background 0.15s;}
.ch-item:hover{background:var(--surface2);}
.ch-item.active{background:rgba(229,9,20,0.1);border-left:3px solid var(--accent);padding-left:9px;}
.ch-num{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;color:var(--text3);width:20px;text-align:right;flex-shrink:0;}
.ch-logo{width:34px;height:34px;border-radius:6px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--text3);font-weight:700;font-family:'Barlow Condensed',sans-serif;overflow:hidden;flex-shrink:0;text-align:center;line-height:1.1;}
.ch-logo img{width:100%;height:100%;object-fit:contain;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:0.8rem;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-item.active .ch-name{color:var(--text);}
.ch-grp{font-size:0.68rem;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* Loading screen */
.loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.loading-bar-wrap{width:260px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;animation:lbar 1.5s ease-in-out infinite;}
@keyframes lbar{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.loading-txt{font-size:0.85rem;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}

/* Grid */
.grid-view{flex:1;overflow-y:auto;padding:20px;display:none;flex-direction:column;}
.grid-view.show{display:flex;}
.grid-view::-webkit-scrollbar{width:5px;}
.grid-view::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.grid-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0;}
.grid-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--text);}
.grid-title span{color:var(--accent);}
.vtoggle{display:flex;gap:5px;}
.vbtn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text3);padding:6px 11px;cursor:pointer;font-size:0.85rem;transition:all 0.2s;}
.vbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:11px;}
.ch-grid.list-mode{grid-template-columns:1fr;}

/* Grid card */
.g-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s;position:relative;}
.g-card:hover{transform:scale(1.04);border-color:rgba(229,9,20,0.4);box-shadow:0 8px 30px rgba(0,0,0,0.55);z-index:2;}
.g-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow);}
.card-thumb{width:100%;aspect-ratio:16/9;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.card-thumb img{width:100%;height:100%;object-fit:contain;}
.card-label{font-size:0.6rem;font-weight:700;color:var(--text3);font-family:'Barlow Condensed',sans-serif;text-align:center;padding:4px 6px;line-height:1.2;}
.play-ov{position:absolute;inset:0;background:rgba(229,9,20,0.82);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.18s;}
.play-ov i{color:#fff;font-size:1.4rem;}
.g-card:hover .play-ov,.g-card.active .play-ov{opacity:1;}
.g-card.active .play-ov{background:rgba(229,9,20,0.65);}
.card-body{padding:8px 10px;}
.card-name{font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
/* List mode card */
.ch-grid.list-mode .g-card{display:flex;align-items:center;gap:12px;padding:8px 14px;}
.ch-grid.list-mode .card-thumb{width:48px;height:48px;aspect-ratio:1;border-radius:6px;flex-shrink:0;}
.ch-grid.list-mode .card-body{flex:1;min-width:0;padding:0;}
.ch-grid.list-mode .play-ov i{font-size:1rem;}

/* PLAYER */
.player-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.player-view.show{display:flex;}
.player-wrap{flex:1;background:#000;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;}
#videoPlayer{width:100%;height:100%;object-fit:contain;display:block;}

.spinner-ov{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9;}
.spinner-ov.show{display:flex;}
.spin{width:46px;height:46px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.player-err{position:absolute;inset:0;background:rgba(0,0,0,0.86);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:10;}
.player-err.show{display:flex;}
.player-err i{font-size:2.5rem;color:var(--accent);}
.player-err p{font-size:0.9rem;color:var(--text2);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;text-align:center;max-width:280px;}
.retry-btn{background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:1px;padding:8px 22px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity 0.2s;}
.retry-btn:hover{opacity:0.85;}

.player-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.87) 0%,transparent 45%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:8;}
.player-wrap:hover .player-ov{opacity:1;pointer-events:auto;}
.now-label{font-size:0.68rem;color:#22c55e;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.now-name{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;line-height:1.1;margin-bottom:12px;}
.ctrl-row{display:flex;align-items:center;gap:9px;}
.cbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:0.9rem;transition:background 0.2s;backdrop-filter:blur(4px);}
.cbtn:hover{background:rgba(229,9,20,0.7);}
.cbtn.big{width:50px;height:50px;font-size:1.1rem;background:var(--accent);border-color:var(--accent);}
.vol-wrap{display:flex;align-items:center;gap:7px;margin-left:auto;color:#fff;font-size:0.85rem;}
.vol-wrap input[type=range]{width:85px;accent-color:var(--accent);cursor:pointer;}
.fs-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:7px 12px;color:#fff;cursor:pointer;font-size:0.85rem;transition:background 0.2s;}
.fs-btn:hover{background:rgba(229,9,20,0.7);}

.player-bar{padding:10px 18px;display:flex;align-items:center;gap:10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.nav-btn{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text2);letter-spacing:0.5px;transition:all 0.2s;}
.nav-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.ch-counter{margin-left:auto;font-size:0.78rem;color:var(--text3);font-family:'Barlow Condensed',sans-serif;}
.ch-counter span{color:var(--accent);font-weight:700;}
.close-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--text2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:7px;transition:all 0.2s;}
.close-btn:hover{background:var(--surface3);color:var(--text);}

/* CMD PALETTE */
.cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:999;display:none;align-items:flex-start;justify-content:center;padding-top:90px;backdrop-filter:blur(5px);}
.cmd-overlay.open{display:flex;}
.cmd-box{width:560px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.85);animation:cmdIn 0.14s ease;}
@keyframes cmdIn{from{opacity:0;transform:scale(0.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.cmd-inp-row{display:flex;align-items:center;padding:15px 18px;border-bottom:1px solid var(--border);gap:12px;}
.cmd-inp-row i{color:var(--accent);font-size:1rem;}
.cmd-inp{flex:1;background:none;border:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;outline:none;}
.cmd-inp::placeholder{color:var(--text3);}
.cmd-res{max-height:380px;overflow-y:auto;}
.cmd-res::-webkit-scrollbar{width:4px;}
.cmd-res::-webkit-scrollbar-thumb{background:var(--surface3);}
.cmd-sec{padding:8px 18px 4px;font-size:0.68rem;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;}
.cmd-item{display:flex;align-items:center;gap:11px;padding:9px 18px;cursor:pointer;transition:background 0.1s;}
.cmd-item:hover,.cmd-item.sel{background:var(--surface2);}
.cmd-item.sel{border-left:3px solid var(--accent);padding-left:15px;}
.cmd-logo{width:30px;height:30px;background:var(--surface3);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.58rem;color:var(--text3);font-weight:700;font-family:'Barlow Condensed',sans-serif;overflow:hidden;flex-shrink:0;}
.cmd-logo img{width:100%;height:100%;object-fit:contain;}
.cmd-cname{font-size:0.86rem;color:var(--text);}
.cmd-cgrp{font-size:0.72rem;color:var(--text3);}
.cmd-foot{padding:9px 18px;border-top:1px solid var(--border);display:flex;gap:14px;}
.cmd-short{display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text3);}

/* TOAST */
.toast{position:fixed;bottom:76px;right:20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:11px 16px;font-size:0.83rem;color:var(--text);z-index:800;transform:translateX(130%);transition:transform 0.28s ease;max-width:290px;box-shadow:0 10px 40px rgba(0,0,0,0.55);}
.toast.show{transform:translateX(0);}
.toast-title{font-weight:600;margin-bottom:2px;}
.toast-sub{color:var(--text3);font-size:0.76rem;}

/* FOOTER */
footer{background:var(--surface);border-top:1px solid var(--border);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;flex-wrap:wrap;}
.foot-brand{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.foot-links{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.foot-link{display:flex;align-items:center;gap:6px;font-size:0.76rem;color:var(--text3);text-decoration:none;transition:color 0.2s;font-family:'Barlow Condensed',sans-serif;font-weight:500;}
.foot-link:hover{color:var(--accent);}
.foot-link i{font-size:0.8rem;}
.foot-copy{font-size:0.7rem;color:var(--text3);font-family:'Barlow Condensed',sans-serif;}
</style>
</head>
<body>

<!-- CMD PALETTE -->
<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-box">
    <div class="cmd-inp-row">
      <i class="fa-solid fa-terminal"></i>
      <input class="cmd-inp" id="cmdInput" placeholder="Rechercher une chaîne... (nom ou numéro)">
    </div>
    <div class="cmd-res" id="cmdResults"></div>
    <div class="cmd-foot">
      <div class="cmd-short"><kbd><i class="fa-solid fa-arrow-up" style="font-size:0.6rem"></i> <i class="fa-solid fa-arrow-down" style="font-size:0.6rem"></i></kbd>&nbsp;naviguer</div>
      <div class="cmd-short"><kbd>Enter</kbd>&nbsp;lancer</div>
      <div class="cmd-short"><kbd>Esc</kbd>&nbsp;fermer</div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-sub" id="toastSub"></div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">IP<em>TV</em></div>
  <div class="header-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="mainSearch" placeholder="Rechercher chaînes, groupes...">
  </div>
  <div class="header-actions">
    <div class="kbd-hint"><kbd>Ctrl+K</kbd> Commande</div>
    <div class="kbd-hint"><kbd><i class="fa-solid fa-arrow-left" style="font-size:0.55rem"></i></kbd><kbd><i class="fa-solid fa-arrow-right" style="font-size:0.55rem"></i></kbd>&nbsp;Nav</div>
    <div class="status-pill">
      <div class="sdot loading" id="sDot"></div>
      <span id="sTxt">Chargement...</span>
    </div>
  </div>
</header>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-tabs">
      <button class="sb-tab active" id="tabC" onclick="switchTab('countries')">
        <i class="fa-solid fa-globe"></i> Pays
      </button>
      <button class="sb-tab" id="tabCh" onclick="switchTab('channels')">
        <i class="fa-solid fa-tv"></i> Chaînes
      </button>
    </div>

    <div class="sb-panel active" id="panel-countries">
      <div class="country-list" id="countryList">
        <div style="padding:30px;text-align:center;color:var(--text3);font-size:0.82rem;">

<script>
// ══════════════════════════════════
//  CONFIG — rename votre fichier ici
// ══════════════════════════════════
const PLAYLIST = 'playlist.m3u8';

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let channels = [], filtered = [], groups = {};
let curCh = null, curIdx = -1, curGroup = null;
let hls = null, curUrl = '', retries = 0;
const MAX_RETRIES = 3;
let cmdRes = [], cmdSel = 0;

// ══════════════════════════════════
//  AUTO-LOAD AU DÉMARRAGE
// ══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadM3U(PLAYLIST);
});

function loadM3U(src) {
  setStatus('loading', 'Chargement...');
  fetch(src + '?nc=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(txt => initPlaylist(txt))
    .catch(err => {
      console.error(err);
      setStatus('error', 'Fichier introuvable');
      document.getElementById('loadingScreen').innerHTML = `
        <div style="text-align:center;padding:20px;">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:2.5rem;color:var(--accent);display:block;margin-bottom:14px;"></i>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--text);margin-bottom:10px;">FICHIER INTROUVABLE</div>
          <div style="font-size:0.85rem;color:var(--text2);line-height:1.7;">
            Placez <strong style="color:var(--accent);">playlist.m3u8</strong> dans le même dossier<br>
            que ce fichier <strong>iptv-player.html</strong><br><br>
            <span style="color:var(--text3);">Ouvrez via un serveur local (Live Server, WAMP, etc.)<br>
            Le chargement direct <em>file://</em> est bloqué par les navigateurs.</span>
          </div>
        </div>`;
    });
}

// ══════════════════════════════════
//  PARSE M3U
// ══════════════════════════════════
function parseM3U(txt) {
  const lines = txt.split(/\r?\n/);
  const chs = [];
  let cur = null;
  for (const line of lines) {
    const l = line.trim();
    if (l.startsWith('#EXTINF')) {
      cur = { id: chs.length, name: '', url: '', logo: '', group: 'Divers' };
      const nm = l.match(/,(.+)$/);
      if (nm) cur.name = nm[1].trim();
      const lg = l.match(/tvg-logo="([^"]*)"/i);
      if (lg && lg[1].trim()) cur.logo = lg[1].trim();
      const gr = l.match(/group-title="([^"]*)"/i);
      if (gr && gr[1].trim()) cur.group = gr[1].trim();
    } else if (l && !l.startsWith('#') && cur) {
      cur.url = l;
      if (cur.name && cur.url) chs.push(cur);
      cur = null;
    }
  }
  return chs;
}

function buildGroups(chs) {
  const g = {};
  chs.forEach(ch => { if (!g[ch.group]) g[ch.group] = []; g[ch.group].push(ch); });
  return g;
}

function initPlaylist(txt) {
  channels = parseM3U(txt);
  if (!channels.length) {
    setStatus('error', 'Aucune chaîne');
    document.getElementById('loadingScreen').innerHTML = `<div style="text-align:center;color:var(--text3);padding:30px;"><i class="fa-solid fa-face-frown" style="font-size:2rem;color:var(--accent);display:block;margin-bottom:12px;"></i>Aucune chaîne trouvée dans la playlist.</div>`;
    return;
  }
  groups = buildGroups(channels);
  filtered = [...channels];
  renderCountries();
  renderGrid(channels, 'TOUTES LES');
  renderChList(channels);
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('gridView').classList.add('show');
  const gc = Object.keys(groups).length;
  setStatus('live', `${channels.length} chaînes · ${gc} groupes`);
  toast('<i class="fa-solid fa-check-circle"></i> Playlist chargée', `${channels.length} chaînes disponibles`);
}

// ══════════════════════════════════
//  STATUS
// ══════════════════════════════════
function setStatus(type, txt) {
  document.getElementById('sDot').className = 'sdot ' + type;
  document.getElementById('sTxt').textContent = txt;
}

// ══════════════════════════════════
//  GROUP ICON (FA)
// ══════════════════════════════════
function gIcon(g) {
  const s = g.toLowerCase();
  if (s.includes('sport')||s.includes('foot')||s.includes('nba')||s.includes('tennis')||s.includes('rugby')) return 'fa-solid fa-futbol';
  if (s.includes('news')||s.includes('info')||s.includes('actua')||s.includes('journal')) return 'fa-solid fa-newspaper';
  if (s.includes('kids')||s.includes('enfant')||s.includes('junior')||s.includes('cartoon')) return 'fa-solid fa-star';
  if (s.includes('cine')||s.includes('movie')||s.includes('film')||s.includes('hbo')||s.includes('netflix')) return 'fa-solid fa-film';
  if (s.includes('music')||s.includes('musique')||s.includes('mtv')||s.includes('clip')) return 'fa-solid fa-music';
  if (s.includes('anime')||s.includes('manga')) return 'fa-solid fa-dragon';
  if (s.includes('doc')||s.includes('nature')||s.includes('discovery')||s.includes('national')) return 'fa-solid fa-video';
  if (s.includes('cook')||s.includes('cuisine')||s.includes('food')) return 'fa-solid fa-utensils';
  if (s.includes('religi')||s.includes('islam')||s.includes('church')||s.includes('gospel')) return 'fa-solid fa-place-of-worship';
  if (s.includes('africa')||s.includes('afrique')) return 'fa-solid fa-earth-africa';
  if (s.includes('europe')) return 'fa-solid fa-earth-europe';
  if (s.includes('asia')||s.includes('asie')||s.includes('china')||s.includes('india')||s.includes('japan')) return 'fa-solid fa-earth-asia';
  if (s.includes('latin')||s.includes('brasil')||s.includes('mexico')||s.includes('ameri')) return 'fa-solid fa-earth-americas';
  return 'fa-solid fa-tv';
}

// ══════════════════════════════════
//  RENDER COUNTRIES
// ══════════════════════════════════
function renderCountries() {
  const list = document.getElementById('countryList');
  list.innerHTML = '';
  const allEl = document.createElement('div');
  allEl.className = 'c-item' + (!curGroup ? ' active' : '');
  allEl.innerHTML = `<i class="fa-solid fa-globe c-icon"></i><span class="c-name">Toutes les chaînes</span><span class="c-count">${channels.length}</span>`;
  allEl.onclick = () => filterGroup(null);
  list.appendChild(allEl);
  Object.entries(groups).sort((a,b) => a[0].localeCompare(b[0])).forEach(([g, chs]) => {
    const el = document.createElement('div');
    el.className = 'c-item' + (curGroup === g ? ' active' : '');
    el.innerHTML = `<i class="${gIcon(g)} c-icon"></i><span class="c-name" title="${e(g)}">${e(g)}</span><span class="c-count">${chs.length}</span>`;
    el.onclick = () => filterGroup(g);
    list.appendChild(el);
  });
}

function filterGroup(g) {
  curGroup = g;
  const chs = g ? (groups[g] || []) : channels;
  filtered = [...chs];
  renderGrid(chs, g ? g.toUpperCase() : 'TOUTES LES');
  renderChList(chs);
  renderCountries();
  if (g) { document.getElementById('chTitle').textContent = g; switchTab('channels'); }
}

// ══════════════════════════════════
//  RENDER GRID
// ══════════════════════════════════
function renderGrid(chs, titleStr) {
  const parts = titleStr.split(' '), last = parts.pop();
  document.getElementById('gridTitle').innerHTML = parts.join(' ') + ' <span>' + last + '</span>';
  const grid = document.getElementById('chGrid');
  grid.innerHTML = '';
  chs.forEach((ch, idx) => {
    const card = document.createElement('div');
    card.className = 'g-card' + (curCh && curCh.id === ch.id ? ' active' : '');
    card.dataset.idx = idx;
    const thumbHtml = ch.logo
      ? `<img src="${e(ch.logo)}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=card-label>${e(ch.name.substring(0,22))}</span>'" alt="">`
      : `<span class="card-label">${e(ch.name.substring(0,22))}</span>`;
    card.innerHTML = `<div class="card-thumb">${thumbHtml}<div class="play-ov"><i class="fa-solid fa-play"></i></div></div><div class="card-body"><div class="card-name">${e(ch.name)}</div></div>`;
    card.onclick = () => playChannel(ch, idx);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════
//  RENDER CHANNEL LIST (sidebar)
// ══════════════════════════════════
function renderChList(chs) {
  const list = document.getElementById('chList');
  list.innerHTML = '';
  chs.forEach((ch, idx) => {
    const item = document.createElement('div');
    item.className = 'ch-item' + (curCh && curCh.id === ch.id ? ' active' : '');
    item.dataset.chidx = idx;
    const logoHtml = ch.logo ? `<img src="${e(ch.logo)}" loading="lazy" onerror="this.style.display='none'" alt="">` : e(ch.name.substring(0,4));
    item.innerHTML = `<span class="ch-num">${idx+1}</span><div class="ch-logo">${logoHtml}</div><div class="ch-info"><div class="ch-name">${e(ch.name)}</div><div class="ch-grp">${e(ch.group)}</div></div>`;
    item.onclick = () => playChannel(ch, idx);
    list.appendChild(item);
  });
}

// ══════════════════════════════════
//  PLAY CHANNEL
// ══════════════════════════════════
function playChannel(ch, idx) {
  curCh = ch; curIdx = idx; retries = 0;
  document.querySelectorAll('.g-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.ch-item').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.g-card[data-idx="${idx}"]`);
  if (card) card.classList.add('active');
  const item = document.querySelector(`.ch-item[data-chidx="${idx}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  document.getElementById('nowName').textContent = ch.name;
  document.getElementById('chCur').textContent = idx + 1;
  document.getElementById('chTot').textContent = filtered.length;
  showPlayer();
  loadStream(ch.url);
  toast(`<i class="fa-solid fa-play"></i> ${e(ch.name)}`, ch.group);
  setStatus('loading', ch.name);
}

function showPlayer() {
  document.getElementById('gridView').classList.remove('show');
  document.getElementById('playerView').classList.add('show');
}

function closePlayer() {
  stopStream();
  document.getElementById('playerView').classList.remove('show');
  document.getElementById('gridView').classList.add('show');
  setStatus('live', `${channels.length} chaînes · ${Object.keys(groups).length} groupes`);
}

// ══════════════════════════════════
//  STREAM ENGINE — ROBUST
// ══════════════════════════════════
function loadStream(url) {
  curUrl = url;
  const video = document.getElementById('videoPlayer');
  document.getElementById('spinnerOv').classList.add('show');
  document.getElementById('playerErr').classList.remove('show');
  document.getElementById('ppBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';

  if (hls) { hls.destroy(); hls = null; }
  video.pause();
  video.removeAttribute('src');
  video.load();

  // Detect HLS
  const u = url.toLowerCase().split('?')[0];
  const isHls = u.endsWith('.m3u8') || u.endsWith('.m3u') || url.includes('m3u8');

  if (Hls.isSupported() && isHls) {
    _playHls(url, video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHls) {
    _playNative(url, video);
  } else {
    _playNative(url, video);
  }
}

function _playHls(url, video) {
  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    backBufferLength: 60,
    maxBufferLength: 30,
    maxMaxBufferLength: 600,
    fragLoadingTimeOut: 20000,
    manifestLoadingTimeOut: 15000,
    levelLoadingTimeOut: 15000,
    xhrSetup: xhr => {
      xhr.withCredentials = false;
    }
  });
  hls.loadSource(url);
  hls.attachMedia(video);
  hls.once(Hls.Events.MANIFEST_PARSED, () => {
    video.play().then(() => {
      hideSpinner(); setStatus('live', curCh ? curCh.name : '');
    }).catch(() => hideSpinner());
  });
  hls.on(Hls.Events.ERROR, (e, data) => {
    if (!data.fatal) return;
    if (data.type === Hls.ErrorTypes.NETWORK_ERROR && retries < MAX_RETRIES) {
      retries++;
      setTimeout(() => hls && hls.startLoad(), 1500 * retries);
    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR && retries < MAX_RETRIES) {
      retries++;
      hls.recoverMediaError();
    } else {
      // Fallback to native
      hls.destroy(); hls = null;
      _playNative(url, video);
    }
  });
}

function _playNative(url, video) {
  video.src = url;
  video.load();
  let played = false;
  video.addEventListener('canplay', function onCP() {
    video.removeEventListener('canplay', onCP);
    if (!played) { played = true; hideSpinner(); setStatus('live', curCh ? curCh.name : ''); }
  });
  video.addEventListener('error', function onErr() {
    video.removeEventListener('error', onErr);
    if (!played) showErr('Flux inaccessible ou format non supporté');
  });
  video.play().then(() => {
    if (!played) { played = true; hideSpinner(); setStatus('live', curCh ? curCh.name : ''); }
  }).catch(err => {
    // If play() rejects but video is actually streaming, canplay handles it
    setTimeout(() => {
      if (video.readyState >= 3) { hideSpinner(); setStatus('live', curCh ? curCh.name : ''); }
      else if (video.error) showErr('Lecture impossible: ' + (video.error.message || 'erreur inconnue'));
    }, 3000);
  });
}

function hideSpinner() {
  document.getElementById('spinnerOv').classList.remove('show');
}

function showErr(msg) {
  hideSpinner();
  document.getElementById('playerErr').classList.add('show');
  document.getElementById('errMsg').textContent = msg || 'Impossible de lire cette chaîne';
  setStatus('error', 'Erreur flux');
}

function retryStream() {
  if (!curCh) return;
  retries = 0;
  document.getElementById('playerErr').classList.remove('show');
  loadStream(curCh.url);
}

function stopStream() {
  const video = document.getElementById('videoPlayer');
  if (hls) { hls.destroy(); hls = null; }
  video.pause();
  video.removeAttribute('src');
  video.load();
  hideSpinner();
  document.getElementById('playerErr').classList.remove('show');
}

// Player controls
function togglePlay() {
  const v = document.getElementById('videoPlayer');
  const btn = document.getElementById('ppBtn');
  if (v.paused) { v.play(); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; }
  else { v.pause(); btn.innerHTML = '<i class="fa-solid fa-play"></i>'; }
}
function setVol(v) { document.getElementById('videoPlayer').volume = parseFloat(v); }
function toggleFS() {
  const w = document.getElementById('playerWrap');
  if (!document.fullscreenElement) w.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
function nextChannel() {
  if (!filtered.length) return;
  const n = (curIdx + 1) % filtered.length;
  playChannel(filtered[n], n);
}
function prevChannel() {
  if (!filtered.length) return;
  const p = (curIdx - 1 + filtered.length) % filtered.length;
  playChannel(filtered[p], p);
}

// ══════════════════════════════════
//  SEARCH
// ══════════════════════════════════
document.getElementById('chSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const base = curGroup ? (groups[curGroup]||[]) : channels;
  renderChList(q ? base.filter(ch => ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)) : base);
});

document.getElementById('mainSearch').addEventListener('input', function() {
  if (!channels.length) return;
  const q = this.value.toLowerCase();
  const base = curGroup ? (groups[curGroup]||[]) : channels;
  const res = q ? base.filter(ch => ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)) : base;
  filtered = res;
  renderGrid(res, q ? `RÉSULTATS` : (curGroup ? curGroup.toUpperCase() : 'TOUTES LES'));
  renderChList(res);
});

// ══════════════════════════════════
//  CMD PALETTE
// ══════════════════════════════════
function openCmd() {
  if (!channels.length) return;
  document.getElementById('cmdOverlay').classList.add('open');
  const inp = document.getElementById('cmdInput');
  inp.value = '';
  inp.focus();
  cmdSel = 0;
  buildCmd('');
}
function closeCmd() { document.getElementById('cmdOverlay').classList.remove('open'); }

document.getElementById('cmdInput').addEventListener('input', function() { cmdSel=0; buildCmd(this.value); });

function buildCmd(q) {
  q = q.toLowerCase().trim();
  cmdRes = q
    ? channels.filter(ch => ch.name.toLowerCase().includes(q)||ch.group.toLowerCase().includes(q)).slice(0,30)
    : channels.slice(0,20);
  renderCmd();
}

function renderCmd() {
  const el = document.getElementById('cmdResults');
  if (!cmdRes.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.83rem;"><i class="fa-solid fa-circle-xmark" style="display:block;font-size:1.5rem;margin-bottom:8px;"></i>Aucun résultat</div>';
    return;
  }
  el.innerHTML = `<div class="cmd-sec"><i class="fa-solid fa-tv" style="margin-right:5px;"></i>CHAÎNES (${cmdRes.length})</div>` +
    cmdRes.map((ch, i) => {
      const logo = ch.logo ? `<img src="${e(ch.logo)}" onerror="this.style.display='none'" alt="">` : e(ch.name.substring(0,4));
      return `<div class="cmd-item${i===cmdSel?' sel':''}" data-ci="${i}">
        <div class="cmd-logo">${logo}</div>
        <div><div class="cmd-cname">${e(ch.name)}</div><div class="cmd-cgrp">${e(ch.group)}</div></div>
      </div>`;
    }).join('');
  el.querySelectorAll('.cmd-item').forEach((it,i) => it.onclick = () => launchCmd(i));
  const s = el.querySelector('.sel');
  if (s) s.scrollIntoView({block:'nearest'});
}

function launchCmd(i) {
  const ch = cmdRes[i];
  if (!ch) return;
  closeCmd();
  const ri = filtered.findIndex(c => c.id === ch.id);
  playChannel(ch, ri >= 0 ? ri : 0);
}

document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key==='ArrowDown') { cmdSel=Math.min(cmdSel+1,cmdRes.length-1); renderCmd(); e.preventDefault(); }
  else if (e.key==='ArrowUp') { cmdSel=Math.max(cmdSel-1,0); renderCmd(); e.preventDefault(); }
  else if (e.key==='Enter') launchCmd(cmdSel);
  else if (e.key==='Escape') closeCmd();
});
document.getElementById('cmdOverlay').addEventListener('click', e => { if(e.target===document.getElementById('cmdOverlay')) closeCmd(); });

// ══════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════
document.addEventListener('keydown', e => {
  const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); openCmd(); return; }
  if (inInput) return;
  const inPlayer = document.getElementById('playerView').classList.contains('show');
  if (e.key==='Escape' && inPlayer) { closePlayer(); return; }
  if (e.key==='ArrowRight' && inPlayer) { nextChannel(); return; }
  if (e.key==='ArrowLeft' && inPlayer) { prevChannel(); return; }
  if (e.key===' ' && inPlayer) { e.preventDefault(); togglePlay(); return; }
  if ((e.key==='f'||e.key==='F') && inPlayer) { toggleFS(); return; }
  if (!e.ctrlKey && !e.metaKey && e.key>='1' && e.key<='9') {
    const idx = parseInt(e.key)-1;
    if (filtered[idx]) playChannel(filtered[idx], idx);
  }
});

// ══════════════════════════════════
//  VIEW MODE
// ══════════════════════════════════
function setView(mode, btn) {
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const g = document.getElementById('chGrid');
  mode==='list' ? g.classList.add('list-mode') : g.classList.remove('list-mode');
}

// ══════════════════════════════════
//  SIDEBAR TABS
// ══════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sb-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab==='countries'?'tabC':'tabCh').classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

// ══════════════════════════════════
//  TOAST
// ══════════════════════════════════
let toastTmr;
function toast(title, sub) {
  document.getElementById('toastTitle').innerHTML = title;
  document.getElementById('toastSub').textContent = sub || '';
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════
//  UTILS
// ══════════════════════════════════
function e(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
